name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML and compose
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          bad = 0
          for f in glob.glob("**/*.yml", recursive=True) + glob.glob("**/*.yaml", recursive=True):
              try:
                  list(yaml.safe_load_all(open(f)))
              except Exception as e:
                  bad += 1; print("FAIL", f, e)
          sys.exit(bad)
          PY
      - name: Compile Python
        run: python3 -m py_compile examples/timor-leste/tools/sandboxctl.py examples/timor-leste/portal/app.py

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom-and-cve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (CycloneDX + SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
      - name: CVE gate (fail on High/Critical)
        uses: anchore/scan-action@v4
        with:
          path: .
          severity-cutoff: high
          fail-build: true
