# Mock e-KYC verification endpoint (test/dev only). Returns a deterministic verdict.
server {
    listen 80;
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = /verify {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;   # sandbox demo: allow the e-KYC HTML page
        return 200 '{"status":"VERIFIED","assurance":"high","method":"document+liveness","subject":"citizen"}';
    }

    location = /healthz {
        return 200 'ok';
    }

    location / {
        return 404;
    }
}
