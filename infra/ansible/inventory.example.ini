# Local-network deployment — copy to inventory.ini and point at REAL systemd hosts on your LAN.
# Ubuntu 22.04/24.04 (Debian family) or Rocky 8/9 (RedHat family). One host per Security Server.
# This performs a REAL install (xroad_simulate=false), unlike the Terraform container simulation.
#
#   cd infra/ansible && ansible-playbook -i inventory.ini site.yml
#
# Each host needs: SSH access, sudo, Python 3, and a routable address the OTHER Security Servers
# can reach on 5500/5577 (set the Security Server address to this host's LAN IP/DNS during init).

[xroad_debian]
ss-mj   ansible_host=192.168.1.10
ss-moh  ansible_host=192.168.1.11
ss-mtc  ansible_host=192.168.1.12
ss-oss  ansible_host=192.168.1.13

[xroad_redhat]
# rocky-ss  ansible_host=192.168.1.20

[xroad:children]
xroad_debian
xroad_redhat

[xroad:vars]
ansible_user=xroad-admin
ansible_become=true
ansible_python_interpreter=auto_silent
xroad_simulate=false
