# X-Road sandbox — Timor-Leste (TEST). Test/dev images and credentials only; never production.
# Central Server + Test CA (CA/OCSP/TSA) + one Security Server per ministry + a mock provider IS.
name: xroad-tl-sandbox

x-ss-env: &ss-env
  XROAD_TOKEN_PIN: "Sandbox_2026"
  XROAD_ADMIN_USER: "xrd"
  XROAD_ADMIN_PASSWORD: "secret"
  XROAD_LOG_LEVEL: "INFO"

services:
  testca:
    image: ghcr.io/nordic-institute/xrddev-testca@sha256:018e9f6ea04634ec61a3d44abee9a86d9dc4f6a2508296fd8db95d272c16c0c5
    hostname: testca
    ports:
      - "8888:8888"   # CA web UI + sign endpoint + OCSP
      - "8899:8899"   # TSA (timestamping)
    volumes:
      - testca-home:/home/ca
    networks: [xroad]
    deploy:
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 512M
    healthcheck:
      interval: 5s
      retries: 40
      test: ["CMD", "curl", "-f", "-k", "http://localhost:8888/testca/certs"]

  cs:
    image: niis/xroad-central-server:noble-7.7.0
    hostname: cs
    ports:
      - "4000:4000"   # Central Server admin UI
    environment:
      XROAD_TOKEN_PIN: "Sandbox_2026"
      XROAD_ADMIN_USER: "xrd"
      XROAD_ADMIN_PASSWORD: "secret"
    # Ephemeral, like the Security Servers: a restart preserves the container's writable layer, but a
    # recreate/wipe starts the Central Server clean. This is what stops stale members/servers/CAs from
    # a previous run accumulating (e.g. an old Ministry of Health lingering after it was replaced).
    networks: [xroad]
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 2560M
    healthcheck:
      interval: 5s
      retries: 40
      test: ["CMD", "curl", "-f", "-k", "https://localhost:4000"]
    depends_on:
      testca:
        condition: service_healthy

  ss-mj:
    image: niis/xroad-security-server-sidecar:7.7.0
    hostname: ss-mj
    ports:
      - "1000:4000"   # admin UI + management REST API
      - "1080:8080"   # information system access (http)
      - "1443:8443"   # information system access (https)
    environment: *ss-env
    networks: [xroad]
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 2560M
    depends_on:
      cs:
        condition: service_healthy

  ss-serve:
    image: niis/xroad-security-server-sidecar:7.7.0
    hostname: ss-serve
    ports:
      - "2000:4000"
      - "2080:8080"
      - "2443:8443"
    environment: *ss-env
    networks: [xroad]
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 2560M
    depends_on:
      cs:
        condition: service_healthy

  ss-mtc:
    image: niis/xroad-security-server-sidecar:7.7.0
    hostname: ss-mtc
    ports:
      - "3000:4000"
      - "3080:8080"
      - "3443:8443"
    environment: *ss-env
    networks: [xroad]
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 2560M
    depends_on:
      cs:
        condition: service_healthy

  ss-oss:
    image: niis/xroad-security-server-sidecar:7.7.0
    hostname: ss-oss
    ports:
      - "5000:4000"   # One-Stop-Shop portal Security Server
      - "5080:8080"
      - "5443:8443"
    environment: *ss-env
    networks: [xroad]
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 2560M
    depends_on:
      cs:
        condition: service_healthy

  # Stand-in provider information systems. Each echoes the request so the
  # end-to-end path (consumer -> SS -> SS -> provider) returns a visible response.
  dntt-mock:
    image: mendhak/http-https-echo:31
    hostname: dntt-mock
    environment:
      HTTP_PORT: "8080"
    networks: [xroad]

  # Civil registry behind the Ministry of Justice (birth-certificate service).
  mj-mock:
    image: mendhak/http-https-echo:31
    hostname: mj-mock
    environment:
      HTTP_PORT: "8080"
    networks: [xroad]

  # Business registry behind SERVE I.P (GOV/SERVE) — the eKYB service. Serves registration data
  # (TL model, adapted from the CamDX eKYB verification APIs; no external domain).
  serve-mock:
    image: nginx:1.27-alpine
    hostname: serve-mock
    volumes:
      - ./xroad/mocks/serve/ekyb.conf:/etc/nginx/conf.d/default.conf:ro
      - ./xroad/mocks/serve/company.json:/usr/share/nginx/html/company.json:ro
    networks: [xroad]

  # ── Citizen identity layer (mock, outside X-Road) ──
  # eID / IdP: mock OpenID Connect provider for citizen login.
  # Discovery: http://localhost:9080/default/.well-known/openid-configuration
  eid-mock:
    image: ghcr.io/navikt/mock-oauth2-server:5.0.1
    hostname: eid-mock
    environment:
      SERVER_PORT: "8080"
      JSON_CONFIG_PATH: /etc/mock-oauth2/config.json
    volumes:
      - ./citizen/identity/eid-config.json:/etc/mock-oauth2/config.json:ro
    ports:
      - "9080:8080"
    networks: [xroad]

  # e-KYC: mock identity-verification endpoint. GET http://localhost:9081/verify
  ekyc-mock:
    image: nginx:1.27-alpine
    hostname: ekyc-mock
    volumes:
      - ./citizen/identity/ekyc.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9081:80"
    networks: [xroad]

  # One-Stop-Shop portal — the citizen entry point.
  # Open http://localhost:8000 ; on load it logs in via eID and calls the services through ss-oss.
  portal:
    build: ./citizen/portal
    hostname: portal
    environment:
      XROAD_MODE: "xroad"         # demo: call mocks directly | xroad: route via ss-oss (needs provisioning)
      XROAD_CLIENT: "TL-TEST/GOV/OSS/PORTAL"
      # OIDC: browser reaches the eID at localhost:9080; the portal reaches it at host.docker.internal:9080.
      EID_PUBLIC_URL: "http://localhost:9080"
      EID_INTERNAL_URL: "http://host.docker.internal:9080"
      OIDC_REDIRECT_URI: "http://localhost:8000/callback"
      OIDC_CLIENT_ID: "balcao-unico"
      EKYC_URL: "http://ekyc-mock:80/verify"
      SS_OSS: "https://ss-oss:8443"
    ports:
      - "8000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [eid-mock, ekyc-mock, dntt-mock, mj-mock]
    networks: [xroad]

  # Hurl E2E testing
  hurl:
    image: ghcr.io/orange-opensource/hurl:latest
    profiles: [test]
    volumes:
      - ./tools:/tools:ro
    command: --insecure --test /tools/e2e.hurl
    networks: [xroad]
    depends_on: [ss-oss]

networks:
  xroad:
    driver: bridge

volumes:
  testca-home:
