# SERVE I.P eKYB mock. Behind ss-serve (GOV/SERVE/REGISTRY). Any eKYB path returns the sample
# business record. Test/dev only; a real deployment queries the SERVE registration database.
server {
    listen 8080;
    root /usr/share/nginx/html;
    default_type application/json;

    location = /healthz {
        return 200 '{"status":"ok"}';
    }

    # /v1/companies/{brn}, /v1/companies/{brn}/tin, /directors, /announcement, ... all resolve to the record.
    location / {
        rewrite ^ /company.json break;
    }
}
